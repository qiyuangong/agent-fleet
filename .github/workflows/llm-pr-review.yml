name: LLM PR Review

"on":
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: llm-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Hosted review
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    environment: llm-pr-review
    timeout-minutes: 20
    steps:
      - name: Check out trusted base revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Install pi coding agent
        env:
          PI_VERSION: "0.81.1"
        run: |
          set -euo pipefail
          if ! command -v pi >/dev/null 2>&1 || \
             [[ "$(pi --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)" != "$PI_VERSION" ]]; then
            npm install -g --ignore-scripts "@earendil-works/pi-coding-agent@${PI_VERSION}" --force
            pi --version
          fi

      - name: Review pull request with pi agent
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LLM_REVIEW_API_KEY: ${{ secrets.LLM_REVIEW_API_KEY }}
          LLM_REVIEW_BASE_URL: ${{ vars.LLM_REVIEW_BASE_URL }}
          LLM_REVIEW_MODEL: ${{ vars.LLM_REVIEW_MODEL }}
          LLM_REVIEW_ID: pi-pr-review
        run: >-
          python3 .github/scripts/pi_pr_review.py
          --event-path "$GITHUB_EVENT_PATH"
          --prompt-path .github/scripts/pi_review_prompt.md
