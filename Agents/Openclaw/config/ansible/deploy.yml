- hosts: openclaw_nodes
  become: true
  vars:
    repo_url: "https://github.com/sii-system/sii-agent-fleet.git"
    repo_dest: "/opt/agent-fleet"
    repo_branch: "main"
  tasks:
    - name: Sync repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dest }}"
        version: "{{ repo_branch }}"
        update: true

    - name: Render fleet env
      template:
        src: templates/fleet.env.j2
        dest: "{{ repo_dest }}/Agents/Openclaw/config/fleet.env"
        mode: "0644"

    - name: Generate compose and configs
      command: ./Agents/Openclaw/scripts/setup.sh
      args:
        chdir: "{{ repo_dest }}"

    - name: Start fleet
      command: docker compose up -d
      args:
        chdir: "{{ repo_dest }}/Agents/Openclaw"
